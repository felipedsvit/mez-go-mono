services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mez_migrate
      POSTGRES_PASSWORD: mez_dev_pass
      POSTGRES_DB: mezgo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mez_migrate"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mezgo
      MINIO_ROOT_PASSWORD: mezgo_dev_pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      MEZ_HTTP_ADDR: ":8080"
      MEZ_DATABASE_URL: "postgres://mez_app:mez_dev_pass@postgres:5432/mezgo?sslmode=disable"
      MEZ_MIGRATE_DATABASE_URL: "postgres://mez_migrate:mez_dev_pass@postgres:5432/mezgo?sslmode=disable"
      MEZ_PLATFORM_DATABASE_URL: "postgres://mez_platform:mez_dev_pass@postgres:5432/mezgo?sslmode=disable"
      MEZ_MASTER_KEY: "${MEZ_MASTER_KEY:-dGVzdC1tYXN0ZXIta2V5LWZvci1kZXYtb25seS0zMi1ieXRlcw==}"
      MEZ_SESSION_SECRET: "dev-session-secret-min-32-chars-long!!!!"
      MEZ_S3_ENDPOINT: "http://minio:9000"
      MEZ_S3_ACCESS_KEY: "mezgo"
      MEZ_S3_SECRET_KEY: "mezgo_dev_pass"
      MEZ_S3_BUCKET: "mezgo-media"
      MEZ_S3_BACKUP_BUCKET: "mezgo-backups"
      MEZ_LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
