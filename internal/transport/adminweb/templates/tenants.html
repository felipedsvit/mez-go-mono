{{define "content"}}
<h1>Tenants</h1>
<div class="card">
    <div style="margin-bottom:15px">
        <a href="/admin/tenants/new" class="btn btn-primary">New Tenant</a>
    </div>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Slug</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Data}}
            <tr>
                <td>{{.Name}}</td>
                <td>{{.Slug}}</td>
                <td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
                <td>{{.CreatedAt.Format "2006-01-02"}}</td>
                <td>
                    <form method="POST" action="/admin/tenants/{{.ID}}/status" style="display:inline">
                        {{if eq .Status "active"}}
                        <input type="hidden" name="status" value="suspended">
                        <button type="submit" class="btn btn-danger btn-sm">Suspend</button>
                        {{else}}
                        <input type="hidden" name="status" value="active">
                        <button type="submit" class="btn btn-primary btn-sm">Activate</button>
                        {{end}}
                    </form>
                </td>
            </tr>
            {{else}}
            <tr><td colspan="5" class="text-center">No tenants found</td></tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
