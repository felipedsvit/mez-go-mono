<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Mez Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #1a1a2e; color: white; padding: 15px 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        header a { color: white; text-decoration: none; }
        header nav a { margin-left: 15px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); padding: 20px; margin-bottom: 20px; }
        .error { background: #fee; color: #c00; padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; }
        .success { background: #efe; color: #0a0; padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: 600; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 4px; text-decoration: none; cursor: pointer; border: none; font-size: 14px; }
        .btn-primary { background: #1a1a2e; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-active { background: #efe; color: #0a0; }
        .badge-disabled { background: #fee; color: #c00; }
        .badge-invited { background: #eef; color: #00a; }
        .login-box { max-width: 400px; margin: 100px auto; }
        .text-center { text-align: center; }
        .mt-10 { margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/admin/"><strong>Mez Admin</strong></a>
            <nav>
                {{if .Principal.Email}}
                <span>{{.Principal.Email}}</span>
                <form method="POST" action="/admin/logout" style="display:inline">
                    <button type="submit" class="btn btn-sm" style="background:rgba(255,255,255,.2);color:white">Logout</button>
                </form>
                {{end}}
            </nav>
        </div>
    </header>
    <div class="container">
        {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
        {{if .Success}}<div class="success">{{.Success}}</div>{{end}}
        {{block "content" .}}{{end}}
    </div>
</body>
</html>
