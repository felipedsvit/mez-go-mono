{{define "content"}}
<h1>Role: {{.Data.Name}}</h1>
<div class="card">
    <p><strong>Scope:</strong> {{.Data.Scope}}</p>
    <p><strong>Built-in:</strong> {{if .Data.IsBuiltin}}Yes{{else}}No{{end}}</p>
    {{if .Data.TenantID}}<p><strong>Tenant:</strong> {{.Data.TenantID}}</p>{{end}}
</div>
<div class="card">
    <h3>Permissions</h3>
    <form method="POST" action="/admin/roles/{{.Data.ID}}/permissions">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;margin:15px 0">
            <label><input type="checkbox" name="permissions" value="tenants:read" {{if hasPerm .Data.Permissions "tenants:read"}}checked{{end}}> tenants:read</label>
            <label><input type="checkbox" name="permissions" value="tenants:create" {{if hasPerm .Data.Permissions "tenants:create"}}checked{{end}}> tenants:create</label>
            <label><input type="checkbox" name="permissions" value="tenants:update" {{if hasPerm .Data.Permissions "tenants:update"}}checked{{end}}> tenants:update</label>
            <label><input type="checkbox" name="permissions" value="tenants:delete" {{if hasPerm .Data.Permissions "tenants:delete"}}checked{{end}}> tenants:delete</label>
            <label><input type="checkbox" name="permissions" value="users:read" {{if hasPerm .Data.Permissions "users:read"}}checked{{end}}> users:read</label>
            <label><input type="checkbox" name="permissions" value="users:create" {{if hasPerm .Data.Permissions "users:create"}}checked{{end}}> users:create</label>
            <label><input type="checkbox" name="permissions" value="users:update" {{if hasPerm .Data.Permissions "users:update"}}checked{{end}}> users:update</label>
            <label><input type="checkbox" name="permissions" value="users:delete" {{if hasPerm .Data.Permissions "users:delete"}}checked{{end}}> users:delete</label>
            <label><input type="checkbox" name="permissions" value="roles:read" {{if hasPerm .Data.Permissions "roles:read"}}checked{{end}}> roles:read</label>
            <label><input type="checkbox" name="permissions" value="roles:create" {{if hasPerm .Data.Permissions "roles:create"}}checked{{end}}> roles:create</label>
            <label><input type="checkbox" name="permissions" value="roles:update" {{if hasPerm .Data.Permissions "roles:update"}}checked{{end}}> roles:update</label>
            <label><input type="checkbox" name="permissions" value="audit:read" {{if hasPerm .Data.Permissions "audit:read"}}checked{{end}}> audit:read</label>
            <label><input type="checkbox" name="permissions" value="secrets:read" {{if hasPerm .Data.Permissions "secrets:read"}}checked{{end}}> secrets:read</label>
            <label><input type="checkbox" name="permissions" value="secrets:create" {{if hasPerm .Data.Permissions "secrets:create"}}checked{{end}}> secrets:create</label>
            <label><input type="checkbox" name="permissions" value="channels:manage" {{if hasPerm .Data.Permissions "channels:manage"}}checked{{end}}> channels:manage</label>
        </div>
        {{if not .Data.IsBuiltin}}
        <button type="submit" class="btn btn-primary">Save Permissions</button>
        {{end}}
    </form>
</div>
<a href="/admin/roles" class="btn">Back to Roles</a>
{{end}}
