{{define "content"}}
<h1>Roles</h1>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Scope</th>
                <th>Built-in</th>
                <th>Permissions</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Data}}
            <tr>
                <td>{{.Name}}</td>
                <td>{{.Scope}}</td>
                <td>{{if .IsBuiltin}}Yes{{else}}No{{end}}</td>
                <td>{{len .Permissions}}</td>
                <td><a href="/admin/roles/{{.ID}}" class="btn btn-sm btn-primary">View</a></td>
            </tr>
            {{else}}
            <tr><td colspan="5" class="text-center">No roles found</td></tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
