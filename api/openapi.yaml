openapi: "3.1.0"
info:
  title: Mez Go Mono API
  description: Omnichannel Messaging Gateway API (Phase 3 — Outbound Pipeline)
  version: "0.3.0"
servers:
  - url: /
security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      security: []
      responses:
        "200":
          description: Service is alive

  /readyz:
    get:
      summary: Readiness check
      operationId: readiness
      security: []
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service not ready

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      security: []
      responses:
        "200":
          description: Metrics in Prometheus format

  /webhooks/meta/{app_id}:
    post:
      summary: Receive a Meta webhook (WABA / Instagram / Messenger)
      operationId: receiveMetaWebhook
      security: []
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetaWebhookPayload"
      responses:
        "200":
          description: Webhook accepted (and persisted, if a message was present)
        "403":
          description: Invalid or missing X-Hub-Signature-256
        "404":
          description: app_id not configured
        "503":
          description: app secret not configured (fail-closed)

  /webhooks/telegram/{tenant_id}:
    post:
      summary: Receive a Telegram Bot webhook
      operationId: receiveTelegramWebhook
      security: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramUpdate"
      responses:
        "200":
          description: Update accepted
        "403":
          description: Invalid or missing X-Telegram-Bot-Api-Secret-Token
        "503":
          description: bot secret not configured (fail-closed)

  /api/conversations:
    get:
      summary: List conversations of the current tenant
      operationId: listConversations
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationList"
        "401":
          description: Missing or invalid Bearer token

  /api/conversations/{id}/assign:
    post:
      summary: "Assign a conversation to an agent (Fase 2: just sets the field)"
      operationId: assignConversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id]
              properties:
                agent_id:
                  type: string
      responses:
        "200":
          description: Assignment recorded
        "404":
          description: Conversation not found

  /api/conversations/{id}/resolve:
    post:
      summary: Mark a conversation as resolved
      operationId: resolveConversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Conversation resolved

  /api/messages:
    get:
      summary: List messages of a conversation
      operationId: listMessages
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageList"
    post:
      summary: Send a message (Fase 3 — real, queues to outbox)
      operationId: postMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutboundMessage"
      responses:
        "200":
          description: Message accepted and queued for delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutboundMessageSent"
        "501":
          description: Channel not implemented (e.g. whatsmeow)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

  /api/messages/{id}/reactions:
    post:
      summary: Add a reaction to a message (D6)
      operationId: postReaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionRequest"
      responses:
        "200":
          description: Reaction queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionAck"

  /api/messages/{id}:
    patch:
      summary: "Edit a sent message (D6: ActionEdit)"
      operationId: editMessage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditRequest"
      responses:
        "200":
          description: Edit queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionAck"
    delete:
      summary: "Revoke a sent message (D6: ActionRevoke)"
      operationId: revokeMessage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRequest"
      responses:
        "200":
          description: Revoke queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionAck"

  /api/channels/{channel}/health:
    get:
      summary: "Health of a channel (Fase 3 - registry-driven)"
      operationId: channelHealth
      parameters:
        - name: channel
          in: path
          required: true
          schema:
            type: string
            enum: [waba, whatsmeow, instagram, messenger, telegram_bot]
      responses:
        "200":
          description: Channel health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelHealth"
        "404":
          description: Channel not registered

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 JWT with claim tenant_id

  schemas:
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [waba, whatsmeow, instagram, messenger, telegram_bot]
        contact_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, pending, resolved]
        external_id:
          type: string
        assigned_agent:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ConversationList:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        total:
          type: integer

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        channel:
          type: string
        conversation_id:
          type: string
          format: uuid
        contact_id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [inbound, outbound]
        type:
          type: string
        status:
          type: string
          enum: [received, routed, notified]
        body:
          type: string
        provider_msg_id:
          type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

    MessageList:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        total:
          type: integer

    OutboundMessage:
      type: object
      required: [conversation_id, channel, peer_id, type, body]
      properties:
        conversation_id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [waba, whatsmeow, instagram, messenger, telegram_bot]
        contact_id:
          type: string
          format: uuid
        peer_id:
          type: string
        type:
          type: string
          enum: [text, image, audio, video, document, sticker, location, button, template, reaction, system]
        body:
          type: string
        metadata:
          type: object

    OutboundMessageSent:
      type: object
      properties:
        message_id:
          type: string
          format: uuid
        status:
          type: string
        channel:
          type: string
        created_at:
          type: string
          format: date-time

    ReactionRequest:
      type: object
      required: [channel, peer_id, target_provider_id, emoji]
      properties:
        channel:
          type: string
        peer_id:
          type: string
        conversation_id:
          type: string
        contact_id:
          type: string
        target_provider_id:
          type: string
        emoji:
          type: string

    EditRequest:
      type: object
      required: [channel, peer_id, target_provider_id, new_body]
      properties:
        channel:
          type: string
        peer_id:
          type: string
        conversation_id:
          type: string
        contact_id:
          type: string
        target_provider_id:
          type: string
        new_body:
          type: string

    RevokeRequest:
      type: object
      required: [channel, peer_id, target_provider_id]
      properties:
        channel:
          type: string
        peer_id:
          type: string
        conversation_id:
          type: string
        contact_id:
          type: string
        target_provider_id:
          type: string

    ActionAck:
      type: object
      properties:
        message_id:
          type: string
        action:
          type: string
        status:
          type: string

    NotImplemented:
      type: object
      properties:
        error:
          type: string
          example: not_implemented
        message:
          type: string
        phase:
          type: string
          example: fase4

    ChannelHealth:
      type: object
      properties:
        channel:
          type: string
        status:
          type: string
        error:
          type: string
        phase:
          type: string

    MetaWebhookPayload:
      type: object
      description: Simplified shape — real payload is much larger
      properties:
        object:
          type: string
        entry:
          type: array
          items:
            type: object

    TelegramUpdate:
      type: object
      properties:
        update_id:
          type: integer
        message:
          type: object
